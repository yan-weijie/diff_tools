<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>JSON 数据对比工具</title>
<style>
* { box-sizing: border-box; }
body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
h1 { text-align: center; color: #333; margin-bottom: 20px; }
.container { max-width: 1500px; margin: 0 auto; }
.input-area { display: flex; gap: 20px; margin-bottom: 15px; }
.input-panel { flex: 1; display: flex; flex-direction: column; }
.input-panel label { font-weight: bold; margin-bottom: 5px; color: #333; font-size: 14px; }
.path-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.path-row input { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
.btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
.btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
.btn-format { background: #52c41a; color: #fff; }
.btn-validate { background: #faad14; color: #fff; }
.btn-compress { background: #722ed1; color: #fff; }
.btn-clear { background: #ff4d4f; color: #fff; }
.btn-compare { background: #4a90d9; color: #fff; padding: 12px 30px; font-size: 15px; }
.btn:hover { opacity: 0.85; }
.btn-compare-row { text-align: center; margin: 15px 0; }
.msg { font-size: 12px; min-height: 18px; margin-bottom: 4px; }
.msg.ok { color: #52c41a; }
.msg.err { color: #f5222d; }
/* JSON可视化区域 */
.json-editor { position: relative; border: 1px solid #ddd; border-radius: 6px; background: #fff; height: 450px; min-height: 200px; max-height: 900px; overflow: hidden; resize: both; }
.json-editor .toolbar { position: absolute; top: 0; left: 0; right: 0; z-index: 10; background: #fafafa; border-bottom: 1px solid #eee; padding: 4px 8px; display: flex; gap: 6px; align-items: center; height: 32px; }
.json-editor .toolbar .btn { padding: 3px 10px; font-size: 11px; }
.json-editor .raw-input { display: none; position: absolute; top: 32px; left: 0; right: 0; bottom: 0; border: none; padding: 10px; font-family: "Consolas","Courier New",monospace; font-size: 13px; resize: none; outline: none; overflow: auto; white-space: pre; word-wrap: normal; }
.json-editor .raw-input.active { display: block; }
.json-editor .json-view { display: none; position: absolute; top: 32px; left: 0; right: 0; bottom: 0; padding: 8px 12px; font-family: "Consolas","Courier New",monospace; font-size: 13px; line-height: 1.6; white-space: pre; word-wrap: normal; overflow: auto; }
.json-editor .json-view.active { display: block; }
/* JSON语法高亮 */
.json-view .json-key { color: #881391; }
.json-view .json-string { color: #0b7500; }
.json-view .json-number { color: #1a01cc; font-weight: bold; }
.json-view .json-bool { color: #1a01cc; font-weight: bold; }
.json-view .json-null { color: #f5222d; font-weight: bold; }
.json-view .json-bracket { color: #333; }
.json-view .json-comma { color: #333; }
.json-view .json-toggle { cursor: pointer; user-select: none; display: inline-block; width: 14px; text-align: center; color: #999; margin-right: 2px; }
.json-view .json-toggle:hover { color: #4a90d9; }
.json-view .json-collapsed { display: none; }
.json-view .json-summary { color: #999; font-style: italic; cursor: pointer; }
.json-view .json-line { padding-left: 0; }
.tab-btns { display: inline-flex; gap: 2px; margin-left: auto; }
.tab-btn { padding: 3px 10px; font-size: 11px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 3px; }
.tab-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
/* 对比结果样式 */
#result { margin-top: 20px; }
#result .summary { background: #fff; padding: 15px; border-radius: 6px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
#result .summary span { margin-right: 20px; }
#result table { border-collapse: collapse; width: 100%; background: #fff; }
#result th, #result td { border: 1px solid #ddd; padding: 6px 10px; font-size: 13px; }
#result th { background: #4a90d9; color: #fff; }
#result tr:nth-child(even) { background: #f9f9f9; }
#result tr.diff { background: #ffe0e0 !important; font-weight: bold; }
#result details { margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
#result details summary { cursor: pointer; padding: 10px 15px; font-weight: bold; font-size: 14px; color: #4a90d9; background: #f7f9fc; border-radius: 6px; }
#result details summary:hover { background: #eaf1fb; }
#result details[open] summary { border-bottom: 1px solid #ddd; border-radius: 6px 6px 0 0; }
#result details table { margin: 0; box-shadow: none; }
#result pre.json-view { background: #f0f4f8; border: 1px solid #ccc; border-radius: 4px; padding: 8px; margin: 0; font-size: 12px; white-space: pre-wrap; word-break: break-all; max-width: 500px; }
#result h3 { margin-top: 25px; color: #4a90d9; }
</style>
</head>
<body>
<div class="container">
  <h1>JSON 数据对比工具</h1>
  <div class="input-area">
    <div class="input-panel">
      <label>New Data (JSON)</label>
      <div class="path-row">
        <span>JsonPath:</span>
        <input type="text" id="newPath" value="$.data.list" placeholder="$.data.list">
      </div>
      <div class="msg" id="newMsg"></div>
      <div class="json-editor" id="newEditor">
        <div class="toolbar">
          <button class="btn btn-format" onclick="formatPanel('new')">格式化</button>
          <button class="btn btn-validate" onclick="validatePanel('new')">校验</button>
          <button class="btn btn-compress" onclick="compressPanel('new')">压缩</button>
          <button class="btn btn-clear" onclick="clearPanel('new')">清空</button>
          <div class="tab-btns">
            <button class="tab-btn active" onclick="switchTab('new','raw')">源码</button>
          </div>
        </div>
        <textarea class="raw-input active" id="newRaw" placeholder="粘贴 JSON 内容..."></textarea>
        <div class="json-view" id="newView"><span style="color:#999">粘贴JSON后点击"格式化"查看</span></div>
      </div>
    </div>
    <div class="input-panel">
      <label>Old Data (JSON)</label>
      <div class="path-row">
        <span>JsonPath:</span>
        <input type="text" id="oldPath" value="$.data.dataList" placeholder="$.data.dataList">
      </div>
      <div class="msg" id="oldMsg"></div>
      <div class="json-editor" id="oldEditor">
        <div class="toolbar">
          <button class="btn btn-format" onclick="formatPanel('old')">格式化</button>
          <button class="btn btn-validate" onclick="validatePanel('old')">校验</button>
          <button class="btn btn-compress" onclick="compressPanel('old')">压缩</button>
          <button class="btn btn-clear" onclick="clearPanel('old')">清空</button>
          <div class="tab-btns">
            <button class="tab-btn active" onclick="switchTab('old','raw')">源码</button>
          </div>
        </div>
        <textarea class="raw-input active" id="oldRaw" placeholder="粘贴 JSON 内容..."></textarea>
        <div class="json-view" id="oldView"><span style="color:#999">粘贴JSON后点击"格式化"查看</span></div>
      </div>
    </div>
  </div>
  <div class="btn-compare-row">
    <button class="btn btn-compare" onclick="compareJson()">开始对比</button>
  </div>
  <div id="result"></div>
</div>

<script>
// 切换源码/可视化 tab
function switchTab(side, tab) {
  const raw = document.getElementById(side + 'Raw');
  const view = document.getElementById(side + 'View');
  const btns = raw.closest('.json-editor').querySelectorAll('.tab-btn');
  if (tab === 'raw') {
    raw.classList.add('active');
    view.classList.remove('active');
    btns[0].classList.add('active');
    btns[1].classList.remove('active');
  } else {
    raw.classList.remove('active');
    view.classList.add('active');
    btns[0].classList.remove('active');
    btns[1].classList.add('active');
    // 尝试渲染
    renderJsonView(side);
  }
}

// 获取当前JSON文本
function getJsonText(side) {
  return document.getElementById(side + 'Raw').value.trim();
}

// 设置JSON文本
function setJsonText(side, text) {
  document.getElementById(side + 'Raw').value = text;
}

function showMsg(id, text, isOk) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (isOk ? 'ok' : 'err');
}

// 格式化
function formatPanel(side) {
  // 如果当前在可视化模式，先同步确保从textarea取值
  const raw = document.getElementById(side + 'Raw');
  const text = raw.value.trim();
  if (!text) { showMsg(side+'Msg', '请输入JSON内容', false); return; }
  try {
    const obj = JSON.parse(text);
    const formatted = JSON.stringify(obj, null, 2);
    raw.value = formatted;
    showMsg(side+'Msg', '格式化成功', true);
    renderJsonView(side);
    switchTab(side, 'view');
  } catch(e) {
    showMsg(side+'Msg', 'JSON格式错误: ' + e.message, false);
  }
}

// 校验
function validatePanel(side) {
  const text = getJsonText(side);
  if (!text) { showMsg(side+'Msg', '请输入JSON内容', false); return; }
  try {
    JSON.parse(text);
    showMsg(side+'Msg', 'JSON格式正确', true);
  } catch(e) {
    showMsg(side+'Msg', 'JSON格式错误: ' + e.message, false);
  }
}

// 压缩
function compressPanel(side) {
  const text = getJsonText(side);
  if (!text) { showMsg(side+'Msg', '请输入JSON内容', false); return; }
  try {
    const obj = JSON.parse(text);
    setJsonText(side, JSON.stringify(obj));
    showMsg(side+'Msg', '压缩成功', true);
  } catch(e) {
    showMsg(side+'Msg', 'JSON格式错误: ' + e.message, false);
  }
}

// 清空
function clearPanel(side) {
  setJsonText(side, '');
  document.getElementById(side+'View').innerHTML = '<span style="color:#999">粘贴JSON后点击"格式化"查看</span>';
  showMsg(side+'Msg', '', true);
}

// JSON可视化渲染(带语法高亮、折叠)
function renderJsonView(side) {
  const text = getJsonText(side);
  const view = document.getElementById(side + 'View');
  if (!text) { view.innerHTML = '<span style="color:#999">粘贴JSON后点击"格式化"查看</span>'; return; }
  try {
    const obj = JSON.parse(text);
    view.innerHTML = renderValue(obj, 0);
  } catch(e) {
    view.innerHTML = '<span style="color:red">JSON解析失败: ' + escHtml(e.message) + '</span>';
  }
}

function escHtml(s) {
  return s.replace(/&/g,'\x26amp;').replace(/</g,'\x26lt;').replace(/>/g,'\x26gt;').replace(/"/g,'\x26quot;');
}

function indent(level) { return '  '.repeat(level); }

function renderValue(val, level) {
  if (val === null) return '<span class="json-null">null</span>';
  if (typeof val === 'boolean') return '<span class="json-bool">' + val + '</span>';
  if (typeof val === 'number') return '<span class="json-number">' + val + '</span>';
  if (typeof val === 'string') return '<span class="json-string">"' + escHtml(val) + '"</span>';
  if (Array.isArray(val)) return renderArray(val, level);
  if (typeof val === 'object') return renderObject(val, level);
  return escHtml(String(val));
}

function renderObject(obj, level) {
  const keys = Object.keys(obj);
  if (keys.length === 0) return '<span class="json-bracket">{}</span>';
  const id = 'node_' + Math.random().toString(36).substr(2,8);
  let html = '<span class="json-toggle" onclick="toggleNode(\'' + id + '\')">&#9660;</span>';
  html += '<span class="json-bracket">{</span>';
  html += '<span class="json-summary" onclick="toggleNode(\'' + id + '\')" id="' + id + '_s" style="display:none">{...} // ' + keys.length + ' items</span>';
  html += '<span id="' + id + '">';
  keys.forEach((key, i) => {
    html += '\n' + indent(level+1);
    html += '<span class="json-key">"' + escHtml(key) + '"</span>: ';
    html += renderValueInline(obj[key], level+1);
    if (i < keys.length - 1) html += '<span class="json-comma">,</span>';
  });
  html += '\n' + indent(level) + '</span><span class="json-bracket">}</span>';
  return html;
}

function renderArray(arr, level) {
  if (arr.length === 0) return '<span class="json-bracket">[]</span>';
  const id = 'node_' + Math.random().toString(36).substr(2,8);
  let html = '<span class="json-toggle" onclick="toggleNode(\'' + id + '\')">&#9660;</span>';
  html += '<span class="json-bracket">[</span>';
  html += '<span class="json-summary" onclick="toggleNode(\'' + id + '\')" id="' + id + '_s" style="display:none">[...] // ' + arr.length + ' items</span>';
  html += '<span id="' + id + '">';
  arr.forEach((item, i) => {
    html += '\n' + indent(level+1) + renderValueInline(item, level+1);
    if (i < arr.length - 1) html += '<span class="json-comma">,</span>';
  });
  html += '\n' + indent(level) + '</span><span class="json-bracket">]</span>';
  return html;
}

// 渲染值（不带外层toggle，用于嵌套在key:value中）
function renderValueInline(val, level) {
  if (val === null) return '<span class="json-null">null</span>';
  if (typeof val === 'boolean') return '<span class="json-bool">' + val + '</span>';
  if (typeof val === 'number') return '<span class="json-number">' + val + '</span>';
  if (typeof val === 'string') return '<span class="json-string">"' + escHtml(val) + '"</span>';
  if (Array.isArray(val)) return renderArray(val, level);
  if (typeof val === 'object') return renderObject(val, level);
  return escHtml(String(val));
}

function toggleNode(id) {
  const el = document.getElementById(id);
  const summary = document.getElementById(id + '_s');
  // DOM: toggle > bracket > summary > el
  const bracket = summary.previousElementSibling;
  const toggle = bracket ? bracket.previousElementSibling : null;
  if (!toggle) return;
  if (el.style.display === 'none') {
    el.style.display = '';
    summary.style.display = 'none';
    toggle.innerHTML = '&#9660;';
  } else {
    el.style.display = 'none';
    summary.style.display = '';
    toggle.innerHTML = '&#9654;';
  }
}

// 对比
async function compareJson() {
  const newJson = getJsonText('new');
  const oldJson = getJsonText('old');
  const newPath = document.getElementById('newPath').value.trim();
  const oldPath = document.getElementById('oldPath').value.trim();
  const resultDiv = document.getElementById('result');
  if (!newJson) { showMsg('newMsg', '请输入New Data JSON', false); return; }
  if (!oldJson) { showMsg('oldMsg', '请输入Old Data JSON', false); return; }
  resultDiv.innerHTML = '<p style="text-align:center;color:#999;">对比中...</p>';
  try {
    const res = await fetch('/api/compare', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ new_json: newJson, old_json: oldJson, new_path: newPath, old_path: oldPath })
    });
    const data = await res.json();
    if (data.ok) {
      resultDiv.innerHTML = data.html;
      showMsg('newMsg', '', true);
      showMsg('oldMsg', '', true);
    } else {
      resultDiv.innerHTML = '<p style="color:red;text-align:center;">' + data.error + '</p>';
    }
  } catch(e) {
    resultDiv.innerHTML = '<p style="color:red;text-align:center;">请求失败: ' + e.message + '</p>';
  }
}

// 监听textarea粘贴事件自动尝试渲染
document.getElementById('newRaw').addEventListener('input', () => { renderJsonView('new'); });
document.getElementById('oldRaw').addEventListener('input', () => { renderJsonView('old'); });
</script>
</body>
</html>
